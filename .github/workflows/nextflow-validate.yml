name: nextflow-validate
# Verify Nextflow ACCEPTS every pipeline without running the analysis. For each
# pipeline this runs `nextflow run <upstream> -profile test,docker -preview`,
# which compiles the pipeline, resolves config + the test profile, runs the
# nf-schema parameter validation and builds the full task DAG — then stops
# before launching any task. It confirms each pinned pipeline is runnable up to
# the moment of execution; the analysis itself is covered by nf-core's own
# per-release CI. Submodules are initialised one at a time and cleaned up, so
# disk stays bounded as the library grows.
on:
  schedule:
    - cron: "0 5 * * 6"      # weekly, Saturday 05:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "sources.tsv"
      - ".gitmodules"
      - "pipelines/*/skill.md"
      - ".github/workflows/nextflow-validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NXF_ANSI_LOG: "false"
    steps:
      # No upfront submodules: each pipeline is initialised on demand below.
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
      - name: Preview every pipeline through Nextflow (no task execution)
        run: bash scripts/nextflow_accept.sh
