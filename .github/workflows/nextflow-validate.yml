name: nextflow-validate
# Verify Nextflow ACCEPTS every pipeline without running the analysis. For each
# pipeline this runs `nextflow run <upstream> -profile test,docker -preview`,
# which compiles the pipeline, resolves config + the test profile, runs the
# nf-schema parameter validation and builds the full task DAG — then stops
# before launching any task. It confirms each pinned pipeline is runnable up to
# the moment of execution; the analysis itself is covered by nf-core's own
# per-release CI. Submodules are initialised one at a time and cleaned up, so
# disk stays bounded as the library grows.
on:
  schedule:
    - cron: "0 5 * * 6"      # weekly, Saturday 05:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "sources.tsv"
      - ".gitmodules"
      - "pipelines/*/skill.md"
      - ".github/workflows/nextflow-validate.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NXF_ANSI_LOG: "false"
    steps:
      # No upfront submodules: each pipeline is initialised on demand below.
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
      - name: Preview every pipeline through Nextflow (no task execution)
        run: |
          fail=0
          # -preview builds the DAG but produces no trace, so disable the report/
          # timeline/trace/dag outputs nf-core configs enable (rendering them with no
          # data fails the run on recent Nextflow).
          cfg="$RUNNER_TEMP/no-reports.config"
          printf 'report.enabled=false\ntimeline.enabled=false\ntrace.enabled=false\ndag.enabled=false\n' > "$cfg"
          {
            echo "## Nextflow acceptance ( -preview )"
            echo "| pipeline | nextflow | accepted |"
            echo "|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"
          for name in $(nfclaw list | cut -f1); do
            up="pipelines/$name/upstream"
            out="$RUNNER_TEMP/prev-$name"
            work="$RUNNER_TEMP/work-$name"
            git submodule update --init --depth 1 "$up"
            # Run each pipeline with the Nextflow version it declares: this satisfies its
            # requirement AND matches the config-parser that release was authored for (no
            # single version serves both pre- and post-strict-parser releases). Releases
            # whose declared minimum predates `-preview` (Nextflow 22.06) are floored to a
            # recent lenient-parser version that still runs their (DSL2) code.
            ver=$(grep -hoE "nextflowVersion[[:space:]]*=[[:space:]]*'[^']+'" "$up/nextflow.config" 2>/dev/null \
                  | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -1)
            ver="${ver:-25.10.4}"
            if [ "$(printf '%s\n22.10.0\n' "$ver" | sort -V | head -1)" = "$ver" ] && [ "$ver" != "22.10.0" ]; then
              ver="24.10.5"
            fi
            echo "::group::$name (nextflow $ver)"
            log="$RUNNER_TEMP/$name.out"
            NXF_VER="$ver" timeout 900 nextflow run "$up" -profile test,docker \
              -c "$cfg" --outdir "$out" -work-dir "$work" -preview > "$log" 2>&1 && rc=0 || rc=$?
            # "Accepted" = Nextflow compiled the pipeline, resolved its config and validated
            # its parameters. rc==0 means -preview also built the full DAG. A non-zero rc is a
            # real REJECTION only if it failed at compile/config/version/parameter validation;
            # if it got past those (preview just couldn't stage remote test inputs, which is
            # analysis-time I/O, out of scope here) the pipeline is still accepted.
            if [ "$rc" = 0 ]; then
              tail -6 "$log"
              echo "| \`$name\` | $ver | ✅ |" >> "$GITHUB_STEP_SUMMARY"
            elif grep -qiE "Config parsing failed|Unexpected input|Invalid include source|does not match workflow required version|Unknown option: -preview|Validation of pipeline parameters failed|DSL ?1|Script compilation error|Unable to parse|MissingMethod" "$log"; then
              cat "$log"
              echo "::error::Nextflow rejected $name (compile/config/version/parameters)"
              echo "| \`$name\` | $ver | ❌ |" >> "$GITHUB_STEP_SUMMARY"
              fail=1
            elif grep -qiE "\* ?PREVIEW ?\*|Only displaying parameters that differ|Core Nextflow options|If you use nf-core" "$log"; then
              tail -6 "$log"
              echo "::warning::$name accepted (compiled + parameters validated); -preview could not stage test inputs"
              echo "| \`$name\` | $ver | ✅ ¹ |" >> "$GITHUB_STEP_SUMMARY"
            else
              cat "$log"
              echo "::error::Nextflow did not accept $name"
              echo "| \`$name\` | $ver | ❌ |" >> "$GITHUB_STEP_SUMMARY"
              fail=1
            fi
            echo "::endgroup::"
            # free disk before the next pipeline
            git submodule deinit -f "$up" >/dev/null 2>&1 || true
            rm -rf "$work" "$out"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "¹ compiled + parameters validated; \`-preview\` could not stage remote test inputs (analysis-time I/O, out of scope)." >> "$GITHUB_STEP_SUMMARY"
          exit $fail
