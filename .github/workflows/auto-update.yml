name: auto-update
on:
  schedule:
    - cron: "0 6 * * *"      # daily 06:00 UTC
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write          # to dispatch the deploy after merge
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: python -m librarian.update_pipelines --repo-root .
      - run: python -m librarian.write_catalog
      # Self-gate: a PR opened with GITHUB_TOKEN does not trigger drift-check.yml, so the drift
      # gate must run here. If regeneration left anything stale, fail now — never open a bad PR.
      - run: python -m librarian.check_drift
      - uses: peter-evans/create-pull-request@v6
        id: cpr
        with:
          branch: auto-update-pipelines
          title: "chore: auto-update pipelines to latest releases"
          commit-message: "chore: bump pipelines + regenerate context"
          body: "Automated: bumped submodules to latest release tags and regenerated skill.md/reference.md/catalog."
      # The in-job drift gate above already validated the change, so the PR is
      # safe to merge automatically. The merge push is made with GITHUB_TOKEN
      # and so does not trigger the push-driven deploy — dispatch it explicitly
      # (workflow_dispatch is exempt from the no-recursion rule).
      - name: Auto-merge and redeploy
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --squash --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"
          gh workflow run deploy-pages.yml --ref main
